<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes Claro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: white; font-family: Arial, sans-serif; }
        header { background: #cc0000; padding: 20px; text-align: center; }
        header h1 { font-size: 28px; }
        .contenido { padding: 30px; max-width: 1200px; margin: auto; }
        h2 { color: #cc0000; margin: 30px 0 15px; font-size: 22px; }
        .planes { display: flex; flex-wrap: wrap; gap: 20px; }
        .plan { background: #2a2a2a; border-radius: 10px; padding: 20px; width: 280px; }
        .plan h3 { color: #cc0000; margin-bottom: 10px; }
        .precio { background: #3a0000; text-align: center; padding: 15px; border-radius: 8px; margin: 10px 0; font-size: 26px; font-weight: bold; }
        .plan p { margin: 5px 0; font-size: 14px; color: #ccc; }
        .plan p span { color: white; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>📱 Planes Claro - Portafolio Asesores</h1>
</header>

<div class="contenido">
    <h2>Planes Móviles</h2>
    <div class="planes">

        <div class="plan">
            <h3>Plan Ejemplo 1</h3>
            <div class="precio">$00.000</div>
            <p><span>GB:</span> 00 GB</p>
            <p><span>Minutos:</span> Ilimitados</p>
            <p><span>SMS:</span> Ilimitados</p>
        </div>

    </div>
</div>

</body>
</html>
